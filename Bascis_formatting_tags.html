<!DOCTYPE html>
<html>
<head>
    <title>Formatting tags</title>
</head>
<body>
    <h1>This is a heading 1</h1>
    <h2>This is a heading 2</h2>
    <p>This is a <em>heading 3</em></p>
    <p>This is a <u>heading 4</u></p>
     <p>This is a <mark>heading 5</mark></p>
      <p>This is a <strong>heading 6</strong></p>
      <p>This is a <small>heading 7</small></p>
</body>
</html>
